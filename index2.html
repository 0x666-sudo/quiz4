<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyber Intelligence Question Bank — QB 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #161b25;
    --surface2:  #1e2536;
    --border:    #2a3349;
    --text:      #dde3f0;
    --muted:     #6b7a9e;
    --accent:    #4f8ef7;
    --green:     #2ecc71;
    --red:       #e74c3c;
    --green-bg:  rgba(46,204,113,.12);
    --red-bg:    rgba(231,76,60,.12);
    --radius:    14px;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }
  .header {
    width: 100%;
    max-width: 780px;
    padding: 36px 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .header .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 800;
    letter-spacing: -.02em;
    text-align: center;
  }
  .header h1 span { color: var(--accent); }
  .progress-wrap {
    width: 100%;
    max-width: 780px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .progress-meta .score-live { color: var(--green); }
  .bar-bg {
    width: 100%;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    transition: width .45s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .chapter-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--accent);
    background: rgba(79,142,247,.1);
    border: 1px solid rgba(79,142,247,.25);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 10px;
    text-transform: uppercase;
    display: inline-block;
  }
  .card {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px 32px;
    position: relative;
    animation: fadeSlideIn .35s ease both;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: .1em;
  }
  .q-text {
    font-size: clamp(16px, 2.5vw, 18px);
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 28px;
    letter-spacing: -.01em;
  }
  .options { display: flex; flex-direction: column; gap: 11px; }
  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
    position: relative;
    overflow: hidden;
  }
  .opt:hover:not(.locked) {
    border-color: var(--accent);
    background: rgba(79,142,247,.07);
    transform: translateX(3px);
  }
  .opt.locked { cursor: default; }
  .opt-label {
    font-family: var(--mono);
    font-size: 12px;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .18s, border-color .18s, color .18s;
  }
  .opt-text {
    font-size: 14px;
    line-height: 1.45;
    flex: 1;
  }
  .opt-icon {
    font-size: 18px;
    margin-left: auto;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .2s;
  }
  .opt.correct {
    border-color: var(--green);
    background: var(--green-bg);
    animation: pulse-green .35s ease;
  }
  .opt.correct .opt-label {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .opt.correct .opt-icon { opacity: 1; color: var(--green); }
  .opt.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    animation: pulse-red .35s ease;
  }
  .opt.wrong .opt-label {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .opt.wrong .opt-icon { opacity: 1; color: var(--red); }
  @keyframes pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(46,204,113,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(46,204,113,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
  }
  @keyframes pulse-red {
    0%   { box-shadow: 0 0 0 0 rgba(231,76,60,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
    100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
  }
  .anchor {
    margin-top: 18px;
    padding: 14px 18px;
    background: rgba(79,142,247,.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    display: none;
    animation: fadeSlideIn .3s ease both;
  }
  .anchor strong {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing:.1em;
    display:block;
    margin-bottom:4px;
  }
  .timer-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    width: 0%;
    background: var(--accent);
    border-radius: 0 0 var(--radius) var(--radius);
    transition: width 1.6s linear;
  }
  .results {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 52px 40px;
    text-align: center;
    animation: fadeSlideIn .4s ease both;
    display: none;
  }
  .results .trophy { font-size: 62px; margin-bottom: 20px; display:block; }
  .results h2 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 10px; }
  .results .score-big {
    font-family: var(--mono);
    font-size: clamp(52px,10vw,80px);
    font-weight: 700;
    line-height: 1;
    margin: 24px 0;
  }
  .results .score-big span { color: var(--accent); }
  .results .grade { font-size: 16px; color: var(--muted); margin-bottom: 32px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
    margin-bottom: 36px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 12px;
  }
  .stat-box .val {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    display: block;
  }
  .stat-box .val.green { color: var(--green); }
  .stat-box .val.red   { color: var(--red);   }
  .stat-box .val.blue  { color: var(--accent); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; display: block; letter-spacing: .07em; }
  .btn-restart {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: .03em;
    transition: background .18s, transform .12s;
  }
  .btn-restart:hover { background: #6aa0ff; transform: translateY(-1px); }
  #chapter-select {
    width: 100%;
    max-width: 780px;
    animation: fadeSlideIn .35s ease both;
  }
  #chapter-select h2 {
    font-size: clamp(20px,4vw,26px);
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -.02em;
  }
  #chapter-select p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .ch-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
    position: relative;
  }
  .ch-card:hover { border-color: var(--accent); background: rgba(79,142,247,.07); transform: translateY(-2px); }
  .ch-card .ch-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: .12em;
  }
  .ch-card .ch-title { font-size: 14px; font-weight: 700; line-height: 1.4; }
  .ch-card .ch-count { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--mono); }
  .ch-card.selected { border-color: var(--accent); background: rgba(79,142,247,.12); }
  .ch-card.selected::after {
    content: '✓';
    position: absolute;
    top: 12px; right: 14px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 700;
  }
  .btn-start-all {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, transform .12s;
    margin-right: 12px;
    margin-top: 4px;
  }
  .btn-start-all:hover { background: #6aa0ff; transform: translateY(-1px); }
  .btn-start-sel {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 32px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, transform .12s;
    margin-top: 4px;
  }
  .btn-start-sel:hover { background: rgba(79,142,247,.1); transform: translateY(-1px); }
  @media (max-width: 560px) {
    .card { padding: 24px 20px 20px; }
    .results { padding: 36px 22px; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <span class="eyebrow">▸ Interactive Study Tool</span>
  <h1>Cyber Intelligence <span>QB 2026</span></h1>
</div>

<div id="chapter-select">
  <h2>Select Lectures</h2>
  <p>Choose which lectures to include, or start all at once.</p>
  <div class="chapter-grid" id="chapterGrid"></div>
  <button class="btn-start-all" onclick="startQuiz('all')">▶ Start All Lectures</button>
  <button class="btn-start-sel" onclick="startQuiz('selected')">Start Selected</button>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-meta">
    <span id="progressLabel">Question 1 of 0</span>
    <span class="score-live" id="scoreLive">Score: 0</span>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
</div>

<div id="quizArea" style="display:none">
  <div class="chapter-badge" id="chapterBadge">Lecture 1</div>
  <div class="card" id="card">
    <div class="q-number" id="qNumber">Q1</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div class="anchor" id="anchor"><strong>📌 MEMORY ANCHOR</strong><span id="anchorText"></span></div>
    <div class="timer-bar" id="timerBar"></div>
  </div>
</div>

<div class="results" id="results">
  <span class="trophy" id="trophy">🎯</span>
  <h2 id="resultsTitle">Quiz Complete!</h2>
  <p class="grade" id="resultsGrade"></p>
  <div class="score-big"><span id="scorePercent">0</span>%</div>
  <div class="stats-grid">
    <div class="stat-box"><span class="val green" id="statCorrect">0</span><span class="lbl">Correct</span></div>
    <div class="stat-box"><span class="val red"   id="statWrong">0</span><span class="lbl">Wrong</span></div>
    <div class="stat-box"><span class="val blue"  id="statTotal">0</span><span class="lbl">Total Q's</span></div>
  </div>
  <button class="btn-restart" onclick="resetToMenu()">↩ Back to Menu</button>
</div>

<script>
const CHAPTERS = [
  {
    name: "Lecture 1 — Introduction to Cyber Intelligence",
    questions: [
      {q:"What is the primary objective of cyber intelligence?",opts:["Offensive hacking","Gathering, analyzing, and using information to predict and prevent cyber threats","Promoting social media awareness","Developing hardware security"],correct:1,anchor:"Cyber intelligence is fundamentally about gathering, analyzing, and using information to predict and prevent cyber threats — not offensive or hardware tasks."},
      {q:"Cyber intelligence involves collecting data related to:",opts:["social media trends","business analytics","Cyber threats, vulnerabilities, and risks","political campaigns"],correct:2,anchor:"The core data of cyber intelligence is cyber threats, vulnerabilities, and risks — not marketing or political data."},
      {q:"Which of the following is not a core domain of cyber intelligence?",opts:["human","digital","Economic.","electronic"],correct:2,anchor:"The three core domains are Human, Digital, and Electronic. Economic is not a domain of cyber intelligence."},
      {q:"What does the digital domain in cyber intelligence focus on?",opts:["Physical security","Malware analysis and network security","Psychological profiling","Economic intelligence"],correct:1,anchor:"The digital domain covers malware analysis and network security — not physical or economic concerns."},
      {q:"The electronic domain in cyber intelligence deals with:",opts:["Network security and encryption","Hardware security, telecommunications, and signals intelligence","Ethical hacking","Behavioral analytics"],correct:1,anchor:"Electronic domain = hardware security, telecommunications, and signals intelligence (SIGINT)."},
      {q:"Which of the following is a key function of behavioral analytics in cyber intelligence?",opts:["data encryption","identifying security patches","Predicting cybercriminal activities","managing cloud storage"],correct:2,anchor:"Behavioral analytics predicts cybercriminal activities by identifying unusual patterns."},
      {q:"What is the primary goal of threat intelligence in cyber intelligence?",opts:["Identifying cyber adversaries and their tactics","Tracking financial transactions","Promoting software updates","Conducting cyber awareness campaigns"],correct:0,anchor:"Threat intelligence targets identifying cyber adversaries and their tactics — TTPs (Tactics, Techniques, Procedures)."},
      {q:"The cyber intelligence lifecycle consists of:",opts:["security policies","firewall implementation","Intelligence collection, analysis, and dissemination","social media monitoring"],correct:2,anchor:"The lifecycle: Collection → Analysis → Dissemination. These three phases define the full intelligence cycle."},
      {q:"Threat analysis in cyber intelligence involves:",opts:["Understanding attack vectors and vulnerabilities","Developing new hardware","Conducting market research","Designing user interfaces"],correct:0,anchor:"Threat analysis = understanding attack vectors and vulnerabilities to predict and counter threats."},
      {q:"What is the role of insider threat intelligence?",opts:["Preventing external cyberattacks","Analyzing cybercriminal behavior.","Managing public relations","Regulating cloud computing services"],correct:1,anchor:"Insider threat intelligence focuses on analyzing cybercriminal behavior, especially from within an organization."},
      {q:"Which historical event significantly influenced the early development of cyber intelligence?",opts:["The Cold War.","The Industrial Revolution","The Renaissance","World War I"],correct:0,anchor:"The Cold War drove nations to develop signals and cyber intelligence capabilities to spy on adversaries."},
      {q:"Who were the first adopters of cyber intelligence?",opts:["nasa","the united nations","Intelligence and military agencies","the red cross"],correct:2,anchor:"Intelligence and military agencies were first — they had the resources and need to develop early cyber intelligence programs."},
      {q:"Why has cyber intelligence become essential in modern security?",opts:["The decline of traditional espionage","The increasing sophistication of cyber threats.","The rise of artificial intelligence","The elimination of traditional security methods"],correct:1,anchor:"The increasing sophistication of cyber threats demands proactive intelligence to stay ahead of attackers."},
      {q:"How does cyber intelligence contribute to national security?",opts:["Protecting citizens from online fraud","Identifying and mitigating cyber threats targeting critical infrastructure","Promoting e-commerce","Regulating software development"],correct:1,anchor:"National security relies on identifying and mitigating cyber threats to critical infrastructure like power grids, water systems, etc."},
      {q:"What differentiates cyber intelligence from cybersecurity?",opts:["Cyber intelligence focuses on predicting threats, while cybersecurity focuses on defense and mitigation","Cyber intelligence is only concerned with military operations","Cybersecurity deals only with software security","Cyber intelligence involves physical security measures"],correct:0,anchor:"Key distinction: Cyber intelligence = PREDICT; Cybersecurity = DEFEND and MITIGATE."},
      {q:"What are key components of a cyber-intelligence framework?",opts:["Data collection","Threat analysis","Incident response","All of the above"],correct:3,anchor:"A complete framework requires all three: data collection, threat analysis, AND incident response."},
      {q:"Cyber intelligence helps prevent which threats?",opts:["Ransomeware","Phising","Insider threats","All of the above"],correct:3,anchor:"Cyber intelligence helps prevent ransomware, phishing, AND insider threats — all categories benefit from proactive intelligence."},
      {q:"Which cybersecurity measures rely on cyber intelligence?",opts:["Endpoint security","Network security","Cloud security","All of the above"],correct:3,anchor:"Endpoint, network, and cloud security all leverage cyber intelligence for threat-aware defense."},
      {q:"Cyber intelligence is used in which sectors?",opts:["Finance","Healthcare","Government","All of the above"],correct:3,anchor:"Finance, healthcare, and government are all major consumers of cyber intelligence."},
      {q:"Which factors influence cyber intelligence effectiveness?",opts:["Data accuracy","Timely analysis","Effective collaboration","All of the above"],correct:3,anchor:"Effectiveness requires all three: accurate data, timely analysis, AND effective collaboration between teams."},
      {q:"What major privacy law regulates data protection in the European Union?",opts:["GDPR.","HIPAA","CISA","PATRIOT Act"],correct:0,anchor:"GDPR (General Data Protection Regulation) is the EU's primary data protection law, enforcing strict rules on data collection."},
      {q:"What are the ethical concerns related to cyber intelligence?",opts:["Cybersecurity training","Data privacy and surveillance.","Developing new software","Creating digital advertisements"],correct:1,anchor:"Cyber intelligence ethics centers on data privacy and surveillance — the tension between security and civil liberties."},
      {q:"How does the Budapest Convention impact cybercrime regulations?",opts:["Regulate AI development","Provide a legal framework for combating cybercrime internationally","Control social media activities","Promote cloud computing"],correct:1,anchor:"The Budapest Convention is the first international treaty on cybercrime, providing a cross-border legal framework."},
      {q:"What U S legislation expanded surveillance powers for intelligence agencies?",opts:["GDPR","USA PATRIOT Act.","The Digital Services Act","The Espionage Act"],correct:1,anchor:"The USA PATRIOT Act (2001) dramatically expanded surveillance powers for US intelligence agencies post-9/11."},
      {q:"Why is cross-border intelligence sharing difficult?",opts:["Differences in legal frameworks across countries","The rapid evolution of cybersecurity tools","The lack of available intelligence","The excessive transparency in threat data"],correct:0,anchor:"Different countries have different laws, regulations, and definitions of cybercrime — making legal cross-border sharing complex."},
      {q:"What motivates cybercriminal organizations?",opts:["Public awareness campaigns","Financial gain.","Promoting cybersecurity ethics","Providing cybersecurity training"],correct:1,anchor:"Financial gain is the primary motivator for most cybercriminal organizations — ransomware, fraud, data theft all generate revenue."},
      {q:"What is an Advanced Persistent Threat (APT)?",opts:["A short-term, low-impact attack","A long-term, stealthy cyber campaign","An accidental data leak","A physical security breach"],correct:1,anchor:"APT = long-term, stealthy campaign. Nation-state actors often use APTs to maintain persistent access for months or years."},
      {q:"What is the primary function of ransomware?",opts:["Spying on user activity","Encrypting files and demanding payment","Slowing down network speed","Exploiting cloud storage"],correct:1,anchor:"Ransomware encrypts victim files and demands payment (ransom) for the decryption key."},
      {q:"Why are critical infrastructure sectors targeted by cybercriminals?",opts:["They have weak security policies","They provide essential services and have high ransom potential","They have outdated software","They offer financial incentives for hackers"],correct:1,anchor:"Critical infrastructure (power, water, hospitals) provides essential services — disruption creates maximum pressure to pay ransoms."},
      {q:"What is an insider threat in cybersecurity?",opts:["A malicious software attack","A threat originating from within an organization","A phishing scam targeting executives","A type of firewall breach"],correct:1,anchor:"Insider threats come from within — employees, contractors, or partners who misuse their access, intentionally or accidentally."},
      {q:"How does social engineering impact cybersecurity?",opts:["By using technical vulnerabilities to hack systems","By manipulating individuals into divulging confidential information","By improving password security","By enhancing AI-driven security measures"],correct:1,anchor:"Social engineering bypasses technical defenses by manipulating people — the human element is often the weakest link."},
      {q:"What is Cybercrime-as-a-Service (CaaS)?",opts:["A legal cybersecurity training service","A platform offering hacking tools and services for cybercriminals","A government-sponsored cybersecurity initiative","A method of preventing cyber attacks"],correct:1,anchor:"CaaS lowers the barrier to entry — criminals can rent ransomware, DDoS tools, or phishing kits without technical skills."},
      {q:"How do cyber espionage groups operate?",opts:["By selling cybersecurity software to governments","By gathering intelligence through hacking and surveillance","By conducting ethical hacking to improve security","By launching random cyber attacks without strategy"],correct:1,anchor:"Cyber espionage groups use strategic hacking and surveillance to gather classified or proprietary intelligence."},
      {q:"What role does digital forensics play in cyber intelligence?",opts:["It helps analyze and recover data from compromised systems","It prevents phishing attacks","It automates cybersecurity defenses","It eliminates the need for antivirus software"],correct:0,anchor:"Digital forensics analyzes and recovers data from compromised systems — essential for post-incident investigation."},
      {q:"What does OSINT stand for in cyber intelligence?",opts:["Open-Source Intelligence.","Offensive Security Integration","Online Security Information Network","Operational Signals Intelligence"],correct:0,anchor:"OSINT = Open-Source Intelligence — gathering info from publicly available sources like social media, news, public records."},
      {q:"Why is malware analysis crucial in cyber intelligence?",opts:["To understand how malware works and develop countermeasures","To promote cybersecurity awareness","To encourage businesses to invest in firewalls","To create stronger passwords"],correct:0,anchor:"Malware analysis reveals how attacks work — enabling defenders to build countermeasures and attribution."},
      {q:"What is the intelligence processing phase in cyber intelligence?",opts:["Filtering and analyzing raw data to extract actionable insights","Deploying antivirus software","Encrypting data on cloud platforms","Tracking user activity on social media"],correct:0,anchor:"Processing phase = filtering raw collected data → extracting actionable insights for decision-makers."},
      {q:"What is threat hunting?",opts:["Actively searching for potential cyber threats before they cause harm","Creating backups for important files","Scanning emails for spam","Monitoring internet browsing activity"],correct:0,anchor:"Threat hunting is PROACTIVE — analysts actively search networks for threats that evaded automated detection."},
      {q:"Which technology is commonly used for cyber threat intelligence?",opts:["Artificial Intelligence.","Blockchain","Intrusion Detection Systems (IDS)","Cloud computing"],correct:0,anchor:"AI is the primary technology — it automates pattern recognition across massive datasets for threat detection."},
      {q:"What is the primary purpose of a cyber-kill chain?",opts:["To outline the steps of a cyber-attack.","To identify security patches for software","To improve network speed","To create new encryption algorithms"],correct:0,anchor:"The Cyber Kill Chain (Lockheed Martin) outlines 7 stages of a cyberattack — from reconnaissance to actions on objectives."},
      {q:"How does behavioral analytics contribute to cyber intelligence?",opts:["By detecting unusual user activity.","By blocking all network traffic","By restricting software downloads","By slowing down malware infections"],correct:0,anchor:"Behavioral analytics flags deviations from baseline behavior — detecting compromised accounts or malicious insiders."},
      {q:"What is the role of digital forensics in cyber intelligence?",opts:["To investigate cyber-crimes and analyze digital evidence","To increase antivirus software efficiency","To promote cybersecurity awareness","To prevent social engineering attacks"],correct:0,anchor:"Digital forensics = investigates crimes + analyzes digital evidence for legal proceedings and incident response."},
      {q:"Which type of cyber-attack involves unauthorized access to sensitive data?",opts:["Data breach.","Phishing attack","Distributed Denial of Service (DDoS) attack","Malware infection"],correct:0,anchor:"A data breach specifically involves unauthorized access to and theft of sensitive data."},

/* ── STATE ── */
let activeQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = 0;
let autoTimer = null;
let selectedChapters = new Set();

const LETTERS = ['A','B','C','D','E'];

/* ── BUILD CHAPTER SELECT ── */
function buildChapterSelect() {
  const grid = document.getElementById('chapterGrid');
  CHAPTERS.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'ch-card';
    card.dataset.idx = i;
    const subtitle = ch.name.split('—')[1]?.trim() || ch.name;
    card.innerHTML = `
      <div class="ch-num">LECTURE ${i+1}</div>
      <div class="ch-title">${subtitle}</div>
      <div class="ch-count">${ch.questions.length} questions</div>
    `;
    card.onclick = () => toggleChapter(i, card);
    grid.appendChild(card);
  });
}

function toggleChapter(idx, card) {
  if (selectedChapters.has(idx)) {
    selectedChapters.delete(idx);
    card.classList.remove('selected');
  } else {
    selectedChapters.add(idx);
    card.classList.add('selected');
  }
}

function startQuiz(mode) {
  let pool = [];
  if (mode === 'all') {
    CHAPTERS.forEach(ch => pool.push(...ch.questions.map(q => ({...q, chapter: ch.name}))));
  } else {
    if (selectedChapters.size === 0) {
      CHAPTERS.forEach(ch => pool.push(...ch.questions.map(q => ({...q, chapter: ch.name}))));
    } else {
      selectedChapters.forEach(i => {
        CHAPTERS[i].questions.forEach(q => pool.push({...q, chapter: CHAPTERS[i].name}));
      });
    }
  }
  activeQuestions = pool.sort(() => Math.random() - 0.5);
  currentIndex = 0; score = 0; answered = 0;
  document.getElementById('chapter-select').style.display = 'none';
  document.getElementById('progressWrap').style.display   = 'flex';
  document.getElementById('quizArea').style.display       = 'block';
  document.getElementById('results').style.display        = 'none';
  renderQuestion();
}

/* ── RENDER ── */
function renderQuestion() {
  if (currentIndex >= activeQuestions.length) { showResults(); return; }
  const q = activeQuestions[currentIndex];
  const total = activeQuestions.length;

  document.getElementById('progressLabel').textContent = `Question ${currentIndex+1} of ${total}`;
  document.getElementById('scoreLive').textContent     = `Score: ${score}`;
  document.getElementById('barFill').style.width       = `${(currentIndex/total)*100}%`;
  document.getElementById('chapterBadge').textContent  = q.chapter || '';
  document.getElementById('qNumber').textContent       = `Q${currentIndex+1}`;
  document.getElementById('qText').textContent         = q.q;

  const anchor = document.getElementById('anchor');
  anchor.style.display = 'none';
  document.getElementById('anchorText').textContent = q.anchor || '';

  const tb = document.getElementById('timerBar');
  tb.style.transition = 'none';
  tb.style.width = '0%';

  const shuffled = q.opts.map((_,i) => i).sort(() => Math.random() - 0.5);
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  shuffled.forEach((origIdx, displayPos) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.dataset.origIdx = origIdx;
    div.dataset.correct = (origIdx === q.correct) ? 'true' : 'false';
    div.innerHTML = `
      <div class="opt-label">${LETTERS[displayPos]}</div>
      <div class="opt-text">${q.opts[origIdx]}</div>
      <div class="opt-icon">${origIdx === q.correct ? '✓' : '✗'}</div>
    `;
    div.onclick = () => handleAnswer(div);
    optContainer.appendChild(div);
  });

  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeSlideIn .35s ease both';
}

/* ── ANSWER ── */
function handleAnswer(clickedDiv) {
  document.querySelectorAll('.opt').forEach(o => o.classList.add('locked'));
  const isCorrect = clickedDiv.dataset.correct === 'true';
  if (isCorrect) {
    score++;
    clickedDiv.classList.add('correct');
  } else {
    clickedDiv.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(o => {
      if (o.dataset.correct === 'true') o.classList.add('correct');
    });
  }
  answered++;
  document.getElementById('anchor').style.display = 'block';

  const tb = document.getElementById('timerBar');
  requestAnimationFrame(() => {
    tb.style.transition = 'width 1.7s linear';
    tb.style.width = '100%';
  });

  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { currentIndex++; renderQuestion(); }, 1850);
}

/* ── RESULTS ── */
function showResults() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('quizArea').style.display     = 'none';
  const r = document.getElementById('results');
  r.style.display = 'block';

  const pct = Math.round((score / activeQuestions.length) * 100);
  document.getElementById('scorePercent').textContent = pct;
  document.getElementById('statCorrect').textContent  = score;
  document.getElementById('statWrong').textContent    = activeQuestions.length - score;
  document.getElementById('statTotal').textContent    = activeQuestions.length;

  let grade, trophy;
  if (pct >= 90)      { grade='Outstanding! 🔥 A+'; trophy='🏆'; }
  else if (pct >= 80) { grade='Excellent work! A';   trophy='🥇'; }
  else if (pct >= 70) { grade='Good job! B';          trophy='🎯'; }
  else if (pct >= 60) { grade='Passing grade. C';     trophy='📚'; }
  else                { grade='Keep studying! 💪';    trophy='🔄'; }

  document.getElementById('trophy').textContent       = trophy;
  document.getElementById('resultsTitle').textContent = grade;
  document.getElementById('resultsGrade').textContent = `You answered ${score} of ${activeQuestions.length} questions correctly.`;
}

function resetToMenu() {
  document.getElementById('results').style.display        = 'none';
  document.getElementById('chapter-select').style.display = 'block';
  selectedChapters.clear();
  document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('selected'));
}

buildChapterSelect();
</script>
