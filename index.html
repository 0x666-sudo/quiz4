<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyber Intelligence Question Bank — QB 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #161b25;
    --surface2:  #1e2536;
    --border:    #2a3349;
    --text:      #dde3f0;
    --muted:     #6b7a9e;
    --accent:    #4f8ef7;
    --green:     #2ecc71;
    --red:       #e74c3c;
    --green-bg:  rgba(46,204,113,.12);
    --red-bg:    rgba(231,76,60,.12);
    --radius:    14px;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }
  .header {
    width: 100%;
    max-width: 780px;
    padding: 36px 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .header .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 800;
    letter-spacing: -.02em;
    text-align: center;
  }
  .header h1 span { color: var(--accent); }
  .progress-wrap {
    width: 100%;
    max-width: 780px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .progress-meta .score-live { color: var(--green); }
  .bar-bg {
    width: 100%;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    transition: width .45s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .chapter-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--accent);
    background: rgba(79,142,247,.1);
    border: 1px solid rgba(79,142,247,.25);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 10px;
    text-transform: uppercase;
    display: inline-block;
  }
  .card {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px 32px;
    position: relative;
    animation: fadeSlideIn .35s ease both;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: .1em;
  }
  .q-text {
    font-size: clamp(16px, 2.5vw, 18px);
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 28px;
    letter-spacing: -.01em;
  }
  .options { display: flex; flex-direction: column; gap: 11px; }
  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
    position: relative;
    overflow: hidden;
  }
  .opt:hover:not(.locked) {
    border-color: var(--accent);
    background: rgba(79,142,247,.07);
    transform: translateX(3px);
  }
  .opt.locked { cursor: default; }
  .opt-label {
    font-family: var(--mono);
    font-size: 12px;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .18s, border-color .18s, color .18s;
  }
  .opt-text {
    font-size: 14px;
    line-height: 1.45;
    flex: 1;
  }
  .opt-icon {
    font-size: 18px;
    margin-left: auto;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .2s;
  }
  .opt.correct {
    border-color: var(--green);
    background: var(--green-bg);
    animation: pulse-green .35s ease;
  }
  .opt.correct .opt-label {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .opt.correct .opt-icon { opacity: 1; color: var(--green); }
  .opt.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    animation: pulse-red .35s ease;
  }
  .opt.wrong .opt-label {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .opt.wrong .opt-icon { opacity: 1; color: var(--red); }
  @keyframes pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(46,204,113,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(46,204,113,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
  }
  @keyframes pulse-red {
    0%   { box-shadow: 0 0 0 0 rgba(231,76,60,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
    100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
  }
  .anchor {
    margin-top: 18px;
    padding: 14px 18px;
    background: rgba(79,142,247,.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    display: none;
    animation: fadeSlideIn .3s ease both;
  }
  .anchor strong {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing:.1em;
    display:block;
    margin-bottom:4px;
  }
  .timer-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    width: 0%;
    background: var(--accent);
    border-radius: 0 0 var(--radius) var(--radius);
    transition: width 1.6s linear;
  }
  .results {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 52px 40px;
    text-align: center;
    animation: fadeSlideIn .4s ease both;
    display: none;
  }
  .results .trophy { font-size: 62px; margin-bottom: 20px; display:block; }
  .results h2 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 10px; }
  .results .score-big {
    font-family: var(--mono);
    font-size: clamp(52px,10vw,80px);
    font-weight: 700;
    line-height: 1;
    margin: 24px 0;
  }
  .results .score-big span { color: var(--accent); }
  .results .grade { font-size: 16px; color: var(--muted); margin-bottom: 32px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
    margin-bottom: 36px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 12px;
  }
  .stat-box .val {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    display: block;
  }
  .stat-box .val.green { color: var(--green); }
  .stat-box .val.red   { color: var(--red);   }
  .stat-box .val.blue  { color: var(--accent); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; display: block; letter-spacing: .07em; }
  .btn-restart {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: .03em;
    transition: background .18s, transform .12s;
  }
  .btn-restart:hover { background: #6aa0ff; transform: translateY(-1px); }
  #chapter-select {
    width: 100%;
    max-width: 780px;
    animation: fadeSlideIn .35s ease both;
  }
  #chapter-select h2 {
    font-size: clamp(20px,4vw,26px);
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -.02em;
  }
  #chapter-select p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .ch-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
    position: relative;
  }
  .ch-card:hover { border-color: var(--accent); background: rgba(79,142,247,.07); transform: translateY(-2px); }
  .ch-card .ch-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: .12em;
  }
  .ch-card .ch-title { font-size: 14px; font-weight: 700; line-height: 1.4; }
  .ch-card .ch-count { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--mono); }
  .ch-card.selected { border-color: var(--accent); background: rgba(79,142,247,.12); }
  .ch-card.selected::after {
    content: '✓';
    position: absolute;
    top: 12px; right: 14px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 700;
  }
  .btn-start-all {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, transform .12s;
    margin-right: 12px;
    margin-top: 4px;
  }
  .btn-start-all:hover { background: #6aa0ff; transform: translateY(-1px); }
  .btn-start-sel {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    padding: 14px 32px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    cursor: pointer;
    transition: background .18s, transform .12s;
    margin-top: 4px;
  }
  .btn-start-sel:hover { background: rgba(79,142,247,.1); transform: translateY(-1px); }
  @media (max-width: 560px) {
    .card { padding: 24px 20px 20px; }
    .results { padding: 36px 22px; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <span class="eyebrow">▸ Interactive Study Tool</span>
  <h1>Cyber Intelligence <span>QB 2026</span></h1>
</div>

<div id="chapter-select">
  <h2>Select Lectures</h2>
  <p>Choose which lectures to include, or start all at once.</p>
  <div class="chapter-grid" id="chapterGrid"></div>
  <button class="btn-start-all" onclick="startQuiz('all')">▶ Start All Lectures</button>
  <button class="btn-start-sel" onclick="startQuiz('selected')">Start Selected</button>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-meta">
    <span id="progressLabel">Question 1 of 0</span>
    <span class="score-live" id="scoreLive">Score: 0</span>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
</div>

<div id="quizArea" style="display:none">
  <div class="chapter-badge" id="chapterBadge">Lecture 1</div>
  <div class="card" id="card">
    <div class="q-number" id="qNumber">Q1</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div class="anchor" id="anchor"><strong>📌 MEMORY ANCHOR</strong><span id="anchorText"></span></div>
    <div class="timer-bar" id="timerBar"></div>
  </div>
</div>

<div class="results" id="results">
  <span class="trophy" id="trophy">🎯</span>
  <h2 id="resultsTitle">Quiz Complete!</h2>
  <p class="grade" id="resultsGrade"></p>
  <div class="score-big"><span id="scorePercent">0</span>%</div>
  <div class="stats-grid">
    <div class="stat-box"><span class="val green" id="statCorrect">0</span><span class="lbl">Correct</span></div>
    <div class="stat-box"><span class="val red"   id="statWrong">0</span><span class="lbl">Wrong</span></div>
    <div class="stat-box"><span class="val blue"  id="statTotal">0</span><span class="lbl">Total Q's</span></div>
  </div>
  <button class="btn-restart" onclick="resetToMenu()">↩ Back to Menu</button>
</div>

<script>
const CHAPTERS = [
  {
    name: "Digital Forensics Question Bank",
    questions: [
      {
        q: "What is the main purpose of Digital Forensics?",
        opts: [
          "To design software systems",
          "To recover deleted games",
          "To collect, analyze, and present digital evidence",
          "To create encrypted files"
        ],
        correct: 2,
        anchor: "To collect, analyze, and present digital evidence"
      },
      {
        q: "Digital forensics can be best described as:",
        opts: [
          "Guessing what happened on a device",
          "Examining digital storage to determine events",
          "Only recovering passwords",
          "Blocking cyber attacks in real time"
        ],
        correct: 1,
        anchor: "Examining digital storage to determine events"
      },
      {
        q: "According to NIST, Digital Forensics involves:",
        opts: [
          "Only mobile phone analysis",
          "Retrieving and analyzing electronic data for investigations",
          "Monitoring social media ads",
          "Designing computer hardware"
        ],
        correct: 1,
        anchor: "Retrieving and analyzing electronic data for investigations"
      },
      {
        q: "Which of the following is a challenge in Digital Forensics?",
        opts: [
          "Writing code faster",
          "Extracting data from damaged devices",
          "Increasing internet speed",
          "Designing websites"
        ],
        correct: 1,
        anchor: "Extracting data from damaged devices"
      },
      {
        q: "In corporate investigations, the target of forensics is usually:",
        opts: [
          "A random person",
          "A government agency",
          "A device rather than a person",
          "Only criminals"
        ],
        correct: 2,
        anchor: "A device rather than a person"
      },
      {
        q: "What is added in the advanced digital forensic lifecycle compared to the traditional model?",
        opts: [
          "Coding phase",
          "Separate Collection and Extraction phases",
          "Marketing phase",
          "Encryption phase"
        ],
        correct: 1,
        anchor: "Separate Collection and Extraction phases"
      },
      {
        q: "The Identification phase mainly focuses on:",
        opts: [
          "Deleting malicious files",
          "Detecting incidents and locating evidence sources",
          "Reporting results to court",
          "Recovering passwords"
        ],
        correct: 1,
        anchor: "Detecting incidents and locating evidence sources"
      },
      {
        q: "Which of the following is NOT an Identification activity?",
        opts: [
          "SOC alerts analysis",
          "Scope definition",
          "Forensic imaging",
          "Risk assessment"
        ],
        correct: 2,
        anchor: "Forensic imaging"
      },
      {
        q: "In digital forensics, Collection means:",
        opts: [
          "Analyzing malware behavior",
          "Retrieving only important files",
          "Copying evidence without modifying it",
          "Writing the final report"
        ],
        correct: 2,
        anchor: "Copying evidence without modifying it"
      },
      {
        q: "Which is considered volatile evidence?",
        opts: [
          "Disk drive",
          "Cloud storage",
          "RAM (memory)",
          "Backup files"
        ],
        correct: 2,
        anchor: "RAM (memory)"
      },
      {
        q: "Chain of Custody ensures:",
        opts: [
          "Faster investigation",
          "Encryption of data",
          "Documentation of evidence handling history",
          "Deletion of irrelevant files"
        ],
        correct: 2,
        anchor: "Documentation of evidence handling history"
      },
      {
        q: "Extraction phase is best described as:",
        opts: [
          "Copying all data from a device",
          "Building timelines",
          "Retrieving relevant artifacts from forensic images",
          "Collecting physical devices"
        ],
        correct: 2,
        anchor: "Retrieving relevant artifacts from forensic images"
      },
      {
        q: "Which of the following is an example of extracted artifacts?",
        opts: [
          "Keyboard hardware",
          "Deleted files and browser history",
          "Monitor display",
          "CPU temperature"
        ],
        correct: 1,
        anchor: "Deleted files and browser history"
      },
      {
        q: "The Analysis phase focuses on:",
        opts: [
          "Storing evidence safely",
          "Reconstructing events and answering investigative questions",
          "Collecting RAM images",
          "Encrypting data"
        ],
        correct: 1,
        anchor: "Reconstructing events and answering investigative questions"
      },
      {
        q: "Why is the Examination phase important?",
        opts: [
          "To increase storage space",
          "To validate findings and ensure legal defensibility",
          "To speed up internet access",
          "To delete unnecessary logs"
        ],
        correct: 1,
        anchor: "To validate findings and ensure legal defensibility"
      },
      {
        q: "Why is computer forensics considered difficult?",
        opts: [
          "Because it only deals with hardware",
          "Because it involves only one operating system",
          "Due to different OS, applications, hardware, and evolving technology",
          "Because data is always encrypted"
        ],
        correct: 2,
        anchor: "Due to different OS, applications, hardware, and evolving technology"
      },
      {
        q: "What does endianness mainly describe in computer systems?",
        opts: [
          "How files are deleted from a system",
          "The order in which bytes are stored in memory",
          "The speed of the processor",
          "The type of storage device used"
        ],
        correct: 1,
        anchor: "The order in which bytes are stored in memory"
      },
      {
        q: "In computing, a byte consists of:",
        opts: [
          "4 bits",
          "8 bits",
          "16 bits",
          "32 bits"
        ],
        correct: 1,
        anchor: "8 bits"
      },
      {
        q: "What does endianness refer to?",
        opts: [
          "Type of CPU architecture",
          "Order in which bytes are stored in memory",
          "File encryption method",
          "Network communication speed"
        ],
        correct: 1,
        anchor: "Order in which bytes are stored in memory"
      },
      {
        q: "In a forensic context, why is knowing the physical size of a storage device important?",
        opts: [
          "To improve internet speed",
          "To detect malware automatically",
          "To ensure all storage space is accounted for and find hidden data",
          "To compress files faster"
        ],
        correct: 2,
        anchor: "To ensure all storage space is accounted for and find hidden data"
      },
      {
        q: "What is the Master Boot Record (MBR) mainly responsible for?",
        opts: [
          "Storing user files",
          "Containing boot code and partition information",
          "Encrypting system data",
          "Managing RAM usage"
        ],
        correct: 1,
        anchor: "Containing boot code and partition information"
      },
      {
        q: "Where is the MBR located on a hard disk?",
        opts: [
          "Last sector of the disk",
          "Middle of the disk",
          "Track 0, Head 0, Sector 1",
          "Random location"
        ],
        correct: 2,
        anchor: "Track 0, Head 0, Sector 1"
      },
      {
        q: "The size of the Master Boot Record (MBR) is:",
        opts: [
          "256 bytes",
          "512 bytes",
          "1024 bytes",
          "2048 bytes"
        ],
        correct: 1,
        anchor: "512 bytes"
      },
      {
        q: "What does the partition table in MBR contain?",
        opts: [
          "User passwords",
          "Operating system files",
          "Information about disk partitions",
          "Network settings"
        ],
        correct: 2,
        anchor: "Information about disk partitions"
      },
      {
        q: "What is the role of a SID in Windows?",
        opts: [
          "To store files",
          "To identify users uniquely",
          "To encrypt disks",
          "To manage hardware drivers"
        ],
        correct: 1,
        anchor: "To identify users uniquely"
      },
      {
        q: "Why is the Master Boot Record (MBR) important in digital forensics?",
        opts: [
          "It stores user documents and images",
          "It contains boot code and partition information that helps identify disk structure",
          "It is used only for internet browsing history",
          "It replaces the operating system"
        ],
        correct: 1,
        anchor: "It contains boot code and partition information that helps identify disk structure"
      },
      {
        q: "What does the Windows Registry mainly store?",
        opts: [
          "Internet history only",
          "System, user, and application configuration data",
          "Deleted files",
          "CPU performance logs"
        ],
        correct: 1,
        anchor: "System, user, and application configuration data"
      },
      {
        q: "What is a \"registry hive\"?",
        opts: [
          "A type of malware",
          "A backup file for RAM",
          "A file that stores part of the registry",
          "A network protocol"
        ],
        correct: 2,
        anchor: "A file that stores part of the registry"
      },
      {
        q: "Which of the following is NOT a common registry hive?",
        opts: [
          "SAM",
          "SYSTEM",
          "SOFTWARE",
          "BOOT"
        ],
        correct: 3,
        anchor: "BOOT"
      },
      {
        q: "Why are transaction logs used in Windows Registry?",
        opts: [
          "To speed up internet connection",
          "To store deleted files",
          "To recover or protect registry changes when corruption occurs",
          "To encrypt user passwords"
        ],
        correct: 2,
        anchor: "To recover or protect registry changes when corruption occurs"
      },
      {
        q: "What is the main function of the Boot Process?",
        opts: [
          "Running antivirus software",
          "Starting the operating system when the computer turns on",
          "Deleting temporary files",
          "Managing user passwords"
        ],
        correct: 1,
        anchor: "Starting the operating system when the computer turns on"
      },
      {
        q: "What does data representation in computers mainly deal with?",
        opts: [
          "Hardware repair",
          "How data is stored and shown in binary form",
          "Internet browsing speed",
          "Screen resolution only"
        ],
        correct: 1,
        anchor: "How data is stored and shown in binary form"
      },
      {
        q: "Which number system uses only 0 and 1?",
        opts: [
          "Decimal",
          "Hexadecimal",
          "Binary",
          "Octal"
        ],
        correct: 2,
        anchor: "Binary"
      },

/* ── STATE ── */
let activeQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = 0;
let autoTimer = null;
let selectedChapters = new Set();

const LETTERS = ['A','B','C','D','E'];

/* ── BUILD CHAPTER SELECT ── */
function buildChapterSelect() {
  const grid = document.getElementById('chapterGrid');
  CHAPTERS.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'ch-card';
    card.dataset.idx = i;
    const subtitle = ch.name.split('—')[1]?.trim() || ch.name;
    card.innerHTML = `
      <div class="ch-num">LECTURE ${i+1}</div>
      <div class="ch-title">${subtitle}</div>
      <div class="ch-count">${ch.questions.length} questions</div>
    `;
    card.onclick = () => toggleChapter(i, card);
    grid.appendChild(card);
  });
}

function toggleChapter(idx, card) {
  if (selectedChapters.has(idx)) {
    selectedChapters.delete(idx);
    card.classList.remove('selected');
  } else {
    selectedChapters.add(idx);
    card.classList.add('selected');
  }
}

function startQuiz(mode) {
  let pool = [];
  if (mode === 'all') {
    CHAPTERS.forEach(ch => pool.push(...ch.questions.map(q => ({...q, chapter: ch.name}))));
  } else {
    if (selectedChapters.size === 0) {
      CHAPTERS.forEach(ch => pool.push(...ch.questions.map(q => ({...q, chapter: ch.name}))));
    } else {
      selectedChapters.forEach(i => {
        CHAPTERS[i].questions.forEach(q => pool.push({...q, chapter: CHAPTERS[i].name}));
      });
    }
  }
  activeQuestions = pool.sort(() => Math.random() - 0.5);
  currentIndex = 0; score = 0; answered = 0;
  document.getElementById('chapter-select').style.display = 'none';
  document.getElementById('progressWrap').style.display   = 'flex';
  document.getElementById('quizArea').style.display       = 'block';
  document.getElementById('results').style.display        = 'none';
  renderQuestion();
}

/* ── RENDER ── */
function renderQuestion() {
  if (currentIndex >= activeQuestions.length) { showResults(); return; }
  const q = activeQuestions[currentIndex];
  const total = activeQuestions.length;

  document.getElementById('progressLabel').textContent = `Question ${currentIndex+1} of ${total}`;
  document.getElementById('scoreLive').textContent     = `Score: ${score}`;
  document.getElementById('barFill').style.width       = `${(currentIndex/total)*100}%`;
  document.getElementById('chapterBadge').textContent  = q.chapter || '';
  document.getElementById('qNumber').textContent       = `Q${currentIndex+1}`;
  document.getElementById('qText').textContent         = q.q;

  const anchor = document.getElementById('anchor');
  anchor.style.display = 'none';
  document.getElementById('anchorText').textContent = q.anchor || '';

  const tb = document.getElementById('timerBar');
  tb.style.transition = 'none';
  tb.style.width = '0%';

  const shuffled = q.opts.map((_,i) => i).sort(() => Math.random() - 0.5);
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  shuffled.forEach((origIdx, displayPos) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.dataset.origIdx = origIdx;
    div.dataset.correct = (origIdx === q.correct) ? 'true' : 'false';
    div.innerHTML = `
      <div class="opt-label">${LETTERS[displayPos]}</div>
      <div class="opt-text">${q.opts[origIdx]}</div>
      <div class="opt-icon">${origIdx === q.correct ? '✓' : '✗'}</div>
    `;
    div.onclick = () => handleAnswer(div);
    optContainer.appendChild(div);
  });

  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeSlideIn .35s ease both';
}

/* ── ANSWER ── */
function handleAnswer(clickedDiv) {
  document.querySelectorAll('.opt').forEach(o => o.classList.add('locked'));
  const isCorrect = clickedDiv.dataset.correct === 'true';
  if (isCorrect) {
    score++;
    clickedDiv.classList.add('correct');
  } else {
    clickedDiv.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(o => {
      if (o.dataset.correct === 'true') o.classList.add('correct');
    });
  }
  answered++;
  document.getElementById('anchor').style.display = 'block';

  const tb = document.getElementById('timerBar');
  requestAnimationFrame(() => {
    tb.style.transition = 'width 1.7s linear';
    tb.style.width = '100%';
  });

  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { currentIndex++; renderQuestion(); }, 1850);
}

/* ── RESULTS ── */
function showResults() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('quizArea').style.display     = 'none';
  const r = document.getElementById('results');
  r.style.display = 'block';

  const pct = Math.round((score / activeQuestions.length) * 100);
  document.getElementById('scorePercent').textContent = pct;
  document.getElementById('statCorrect').textContent  = score;
  document.getElementById('statWrong').textContent    = activeQuestions.length - score;
  document.getElementById('statTotal').textContent    = activeQuestions.length;

  let grade, trophy;
  if (pct >= 90)      { grade='Outstanding! 🔥 A+'; trophy='🏆'; }
  else if (pct >= 80) { grade='Excellent work! A';   trophy='🥇'; }
  else if (pct >= 70) { grade='Good job! B';          trophy='🎯'; }
  else if (pct >= 60) { grade='Passing grade. C';     trophy='📚'; }
  else                { grade='Keep studying! 💪';    trophy='🔄'; }

  document.getElementById('trophy').textContent       = trophy;
  document.getElementById('resultsTitle').textContent = grade;
  document.getElementById('resultsGrade').textContent = `You answered ${score} of ${activeQuestions.length} questions correctly.`;
}

function resetToMenu() {
  document.getElementById('results').style.display        = 'none';
  document.getElementById('chapter-select').style.display = 'block';
  selectedChapters.clear();
  document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('selected'));
}

buildChapterSelect();
